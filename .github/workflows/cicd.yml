name: CICD-Pipeline 

on:
  push:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17 for compilation
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Compile Java sources
      run: mvn compile
      
    - name: Write compile job summary
      if: always()
      run: |
        {
          echo "## Compile Results"
          echo "- Maven compile completed"
          echo "- Check target/ directory for compiled classes"
        } >> $GITHUB_STEP_SUMMARY
      
  security-check:
    runs-on: self-hosted
    needs: compile

    steps:
    - uses: actions/checkout@v4
    - name: Install Trivy (vulnerability scanner)
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update -y
        sudo apt-get install -y trivy

    - name: Run Trivy filesystem scan (outputs fs-report.json)
      run: trivy fs --format table -o fs-report.json .

    - name: Install Gitleaks (secret scanner)
      run: sudo apt install gitleaks -y
    - name: Run Gitleaks scan (outputs gitleaks-report.json)
      run: gitleaks detect source . -r gitleaks-report.json -f json
      
    - name: Write security job summary
      if: always()
      run: |
        {
          echo "## Security Scan Results"
          echo "- Trivy scan report: Check fs-report.json"
          echo "- Gitleaks scan report: Check gitleaks-report.json"
          echo "- Note: Review scan reports for any security findings"
        } >> $GITHUB_STEP_SUMMARY

  test:
    runs-on: self-hosted
    needs: security-check
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17 for tests
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run unit tests
      run: mvn test
      
    - name: Write test job summary
      if: always()
      run: |
        {
          echo "## Test Results"
          echo "### Unit Test Summary"
          echo "\`\`\`"
          # Install xmlstarlet for better XML parsing
          sudo apt-get install -y xmlstarlet
          
          # Process all test XML files and sum up the metrics
          TOTAL_TESTS=0
          TOTAL_FAILURES=0
          TOTAL_ERRORS=0
          TOTAL_SKIPPED=0
          
          for file in target/surefire-reports/TEST-*.xml; do
            if [ -f "$file" ]; then
              TESTS=$(xmlstarlet sel -t -v "//testsuite/@tests" "$file" || echo "0")
              FAILURES=$(xmlstarlet sel -t -v "//testsuite/@failures" "$file" || echo "0")
              ERRORS=$(xmlstarlet sel -t -v "//testsuite/@errors" "$file" || echo "0")
              SKIPPED=$(xmlstarlet sel -t -v "//testsuite/@skipped" "$file" || echo "0")
              
              TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
              TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
              TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
              TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
            fi
          done
          
          echo "Total Tests: $TOTAL_TESTS"
          echo "Failures: $TOTAL_FAILURES"
          echo "Errors: $TOTAL_ERRORS"
          echo "Skipped: $TOTAL_SKIPPED"
          echo "\`\`\`"
          echo "### Failed Tests (if any)"
          echo "\`\`\`"
          find target/surefire-reports -name '*.xml' -exec sh -c "xmllint --xpath '//testcase[failure or error]/@name' {} 2>/dev/null" \;
          echo "\`\`\`"
          echo "Detailed reports available in target/surefire-reports"
        } >> $GITHUB_STEP_SUMMARY

  build_project_and_sonar_scan:
    runs-on: self-hosted
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Package application (JAR)
      run: mvn package
    - name: Upload application JAR as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar 
        
    - uses: actions/checkout@v4
      with:
        # Disabling shallow clones is recommended for improving the relevancy of reporting
        fetch-depth: 0
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0 # Ex: v4.1.0, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        
    - name: SonarQube Quality Gate check
      id: sonarqube-quality-gate-check
      uses: sonarsource/sonarqube-quality-gate-action@master
      with:
        pollingTimeoutSec: 600
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          
    - name: Write build and sonar job summary
      if: always()
      run: |
        {
          echo "## Build and SonarQube Analysis Results"
          echo "### Maven Build"
          echo "- JAR artifact uploaded as 'app-jar'"
          echo "### SonarQube Results"
          echo "- Analysis URL: ${{ vars.SONAR_HOST_URL }}/dashboard?id=${GITHUB_REPOSITORY##*/}"
          echo "#### Key Metrics"
          echo "\`\`\`"
          
          # Install jq for JSON parsing if not present
          sudo apt-get install -y jq
          
          # Function to fetch and format SonarQube metric
          fetch_metric() {
            local metric=$1
            local value=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" "${{ vars.SONAR_HOST_URL }}/api/measures/component?component=${GITHUB_REPOSITORY##*/}&metricKeys=$metric" | jq -r '.component.measures[0].value // "N/A"')
            echo "$value"
          }
          
          # Fetch metrics with error handling
          COVERAGE=$(fetch_metric "coverage")
          BUGS=$(fetch_metric "bugs")
          CODE_SMELLS=$(fetch_metric "code_smells")
          VULNERABILITIES=$(fetch_metric "vulnerabilities")
          
          # Format and display metrics
          echo "Coverage: ${COVERAGE:-0}%"
          echo "Bugs: ${BUGS:-0}"
          echo "Code Smells: ${CODE_SMELLS:-0}"
          echo "Vulnerabilities: ${VULNERABILITIES:-0}"
          echo "\`\`\`"
          
          # Add explanation if metrics are missing
          if [[ "$COVERAGE" == "N/A" || "$BUGS" == "N/A" || "$CODE_SMELLS" == "N/A" || "$VULNERABILITIES" == "N/A" ]]; then
            echo "⚠️ Some metrics are not available. This might be because:"
            echo "1. First analysis is still running"
            echo "2. Project hasn't been analyzed yet"
            echo "3. SonarQube connection issues"
          fi
        } >> $GITHUB_STEP_SUMMARY

  build_docker_image_and_push:
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    runs-on: self-hosted
    needs: build_project_and_sonar_scan
    steps:
    - uses: actions/checkout@v4
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app  # this will download JAR to ./app folder

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image locally first
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true # Build and load locally instead of pushing
        tags: bankapp:latest
        file: ./Dockerfile

    - name: Run Trivy vulnerability scanner (Detailed HTML Report)
      uses: aquasecurity/trivy-action@0.67.2
      with:
        image-ref: 'bankapp:latest'
        format: 'template'
        template: '@/usr/local/share/trivy/templates/html.tpl'
        output: 'image-scan.html'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
        skip-version-check: true
        scanners: vuln
        timeout: '10m'
        ignore-unfixed: true
        vuln-type: 'os,library'

    - name: Run Trivy for job summary (Security Issues)
      uses: aquasecurity/trivy-action@0.67.2
      with:
        image-ref: 'bankapp:latest'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
        skip-version-check: true
        scanners: vuln
        timeout: '10m'
        ignore-unfixed: true
        vuln-type: 'os,library'
        
    - name: Run Trivy for secrets scan
      uses: aquasecurity/trivy-action@0.67.2
      if: always()
      with:
        image-ref: 'bankapp:latest'
        format: 'table'
        output: 'secrets-scan.txt'
        exit-code: '0'
        skip-version-check: true
        scanners: secret
        timeout: '5m'
        security-checks: secret
        
    - name: Upload Trivy scan results to Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check vulnerability status
      id: push-image
      run: |
        # Check for CRITICAL vulnerabilities that have available fixes
        CRITICAL_COUNT=$(grep "CRITICAL" image-scan.txt | grep -v "0" || echo "0")
        
        if [ ! -z "$CRITICAL_COUNT" ] && [ "$CRITICAL_COUNT" != "0" ]; then
          echo "::warning::Found CRITICAL vulnerabilities with fixes available. Review scan results."
          # Still push but mark as potentially vulnerable
          docker tag bankapp:latest ${{ steps.login-ecr.outputs.registry }}/bankapp:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/bankapp:latest
          echo "image_status=vulnerable" >> $GITHUB_OUTPUT
        else
          docker tag bankapp:latest ${{ steps.login-ecr.outputs.registry }}/bankapp:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/bankapp:latest
          echo "image_status=secure" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload detailed scan results
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: |
          image-scan.html
          image-scan.txt
        
    - name: Write Docker build & security summary
      if: always()
      run: |
        {
          echo "## Docker Build & Security Results"
          echo "### Build Information"
          echo "- Image Status: ${{ steps.push-image.outputs.image_status }}"
          echo "- Image Location: \`${{ steps.login-ecr.outputs.registry }}/bankapp:latest\`"
          
          echo "### Image Scan Results"
          echo "Detailed HTML report uploaded as artifact 'trivy-results'"
          
          if [ -f image-scan.txt ]; then
            echo "#### High & Critical Vulnerabilities"
            echo "\`\`\`"
            cat image-scan.txt
            echo "\`\`\`"
            
            # Count vulnerabilities by severity
            CRIT_COUNT=$(grep "CRITICAL" image-scan.txt | grep -v "0" | wc -l || echo "0")
            HIGH_COUNT=$(grep "HIGH" image-scan.txt | grep -v "0" | wc -l || echo "0")
            
            echo "#### Summary"
            echo "- Critical vulnerabilities: ${CRIT_COUNT}"
            echo "- High vulnerabilities: ${HIGH_COUNT}"
            
            if [ "${{ steps.push-image.outputs.image_status }}" = "vulnerable" ]; then
              echo "⚠️ **WARNING**: Image was pushed but contains critical vulnerabilities that should be addressed"
            else
              echo "✅ No critical vulnerabilities with available fixes found"
            fi
          else
            echo "⚠️ No scan results available - check job logs for errors"
          fi
          
          echo "### Next Steps"
          echo "1. Download and review the detailed HTML report from artifacts"
          echo "2. Check image scan results for any critical vulnerabilities"
          echo "3. Update base image or dependencies if needed to resolve vulnerabilities"
        } >> $GITHUB_STEP_SUMMARY

  deploy_to_kubernetes:
    runs-on: self-hosted
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    needs: build_docker_image_and_push
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: latest
        
    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.EKS_KUBECONFIG }}" > $HOME/.kube/config

    - name: Deploy to EKS
      run: |
        kubectl apply -f ds.yml
        
    - name: Write deployment summary
      if: always()
      run: |
        {
          echo "## Deployment Status"
          echo "- Deployed manifests from ds.yml to EKS cluster"
          echo "- Check cluster status with: kubectl get pods,svc"
        } >> $GITHUB_STEP_SUMMARY